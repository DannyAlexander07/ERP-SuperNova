<link rel="stylesheet" href="modules/inicio/inicio.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="dashboard-container">
    
    <div id="banner-comunicado" style="display: none; margin-bottom: 20px; padding: 15px 20px; border-radius: 8px; align-items: flex-start; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: slideDown 0.4s ease-out;">
        <i class='bx bx-news' style="font-size: 2rem; margin-top: 2px;"></i>
        <div>
            <h3 id="banner-titulo" style="margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 700;"></h3>
            <p id="banner-mensaje" style="margin: 0; font-size: 0.9rem; line-height: 1.4;"></p>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-icon pending"><i class='bx bx-time-five'></i></div>
            <div class="kpi-details">
                <h3>Pendiente(s)</h3>
                <p id="kpi-pendientes">0</p>
            </div>
            <div class="kpi-footer" onclick="cargarModulo('comprobantes')">Ver detalles <i class='bx bx-right-arrow-alt'></i></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-icon rejected"><i class='bx bx-x-circle'></i></div>
            <div class="kpi-details">
                <h3>Rechazado(s)</h3>
                <p id="kpi-rechazados">0</p>
            </div>
            <div class="kpi-footer" onclick="cargarModulo('comprobantes')">Ver detalles <i class='bx bx-right-arrow-alt'></i></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-icon pending"><i class='bx bx-time-five'></i></div>
            <div class="kpi-details">
                <h3>Pendiente / Parcial</h3> <p id="kpi-programados">0</p> </div>
            <div class="kpi-footer" onclick="cargarModulo('comprobantes')">Ver detalles <i class='bx bx-right-arrow-alt'></i></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-icon paid"><i class='bx bx-check-double'></i></div>
            <div class="kpi-details">
                <h3>Pagado(s)</h3>
                <p id="kpi-pagados">0</p>
            </div>
            <div class="kpi-footer" onclick="cargarModulo('comprobantes')">Ver detalles <i class='bx bx-right-arrow-alt'></i></div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header">
                <h3>Reporte de Estado de Comprobantes</h3>
            </div>
            <div class="chart-body">
                <canvas id="chartEstados"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h3>Reporte por Tipo de Servicio</h3>
            </div>
            <div class="chart-body">
                <canvas id="chartTipos"></canvas>
            </div>
        </div>
    </div>

</div>

<style>
    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
<script src="modules/inicio/inicio.js"></script>
